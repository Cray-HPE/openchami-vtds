name: vTDS
run-name: Run vTDS tests
on: [workflow_dispatch]
jobs:
  vTDS:
    runs-on: ubuntu-latest
    steps:
      # We need to use checkout first to persist credentials across steps.
      - uses: 'actions/checkout@v4'
      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: hpe-openchami-tester
          credentials_json: '${{ secrets.GOOGLE_CREDS }}'
      - uses: 'google-github-actions/setup-gcloud@v3'
        with:
          # Pinned versions prevent surprises.
          version: "565.0.0"
      - name: 'SSH'
        run: 'gcloud compute ssh testbuilder@openchami-tester-001 --project=hpe-openchami-tester --zone=us-central1-a --command="uname -a"'
