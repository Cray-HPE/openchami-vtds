name: vTDS
run-name: Run vTDS tests
on: [push, pull_request]
jobs:
  vTDS:
    runs-on: ubuntu-latest
    steps:
      # We need to use checkout first to persist credentials across steps.
      - uses: 'actions/checkout@v4'
      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: hpe-openchami-tester
          credentials_json: '${{ secrets.GOOGLE_CREDS }}'
