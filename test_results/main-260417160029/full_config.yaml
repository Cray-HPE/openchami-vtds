application:
  cluster:
    domain_name: openchami.cluster
  deployment:
    mode: quadlet
  discovery_networks:
    hardware_management:
      blade_classes:
      - host-blade
      network_cidr: null
      network_name: hwmgtnet
      redfish_password: null # Removed
      redfish_username: root
  dns:
    public: 169.254.169.254
    site: 10.234.0.1
  host:
    network: compnet
    node_class: management_node
    node_name: demo
  images:
    active: compute-debug-rocky9
    build_order:
    - rocky-base-9
    - compute-base-rocky9
    builders:
      compute-base-rocky9:
        cmds: []
        options:
          layer_type: base
          name: compute-base
          parent: '{{ hosting_config.management.net_head_fqdn }}:5000/demo/rocky-base:9'
          pkg_manager: dnf
          publish_registry: '{{ hosting_config.management.net_head_fqdn }}:5000/demo'
          publish_s3: http://{{ hosting_config.management.net_head_fqdn }}:9000
          publish_tags:
          - rocky9
          registry_opts_pull:
          - --tls-verify=false
          registry_opts_push:
          - --tls-verify=false
          s3_bucket: boot-images
          s3_prefix: compute/base/
        packages:
        - boxes
        - cowsay
        - figlet
        - fortune-mod
        - git
        - nfs-utils
        - tcpdump
        - traceroute
        - vim
        repos:
        - alias: Epel9
          gpg: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-9
          url: https://dl.fedoraproject.org/pub/epel/9/Everything/x86_64/
      compute-debug-rocky9:
        cmds:
        - cmd: useradd -m-G testgroup -g wheel -p $1$yhqNtoLh$1zUoDhMfF/mn4/GFm3UyZ0
        - cmd: groupadd -f wheel
        - cmd: groupadd -f testgroup
        options:
          layer_type: base
          name: compute-debug
          parent: '{{ hosting_config.management.net_head_fqdn }}:5000/demo/compute-base:rocky9'
          pkg_manager: dnf
          publish_s3: http://{{ hosting_config.management.net_head_fqdn }}:9000
          publish_tags:
          - rocky9
          registry_opts_pull:
          - --tls-verify=false
          s3_bucket: boot-images
          s3_prefix: compute/debug/
        packages:
        - shadow-utils
      rocky-base-9:
        cmds:
        - cmd: dracut --add "dmsquash-live livenet network-manager" --kver $(basename
            /lib/modules/*) -N -f --logfile /tmp/dracut.log 2>/dev/null
        - cmd: echo DRACUT LOG:; cat /tmp/dracut.log
        options:
          layer_type: base
          name: rocky-base
          parent: scratch
          pkg_manager: dnf
          publish_registry: '{{ hosting_config.management.net_head_fqdn }}:5000/demo'
          publish_tags: '9'
          registry_opts_push:
          - --tls-verify=false
        package_groups:
        - Minimal Install
        - Development Tools
        packages:
        - chrony
        - cloud-init
        - dracut-live
        - kernel
        - rsyslog
        - sudo
        - wget
        repos:
        - alias: Rocky_9_BaseOS
          gpg: https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-9
          url: https://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/
        - alias: Rocky_9_AppStream
          gpg: https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-9
          url: https://dl.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/
    groups:
      compute-debug-rocky9:
      - name: testgroup
      - name: wheel
    users:
      compute-debug-rocky9:
      - name: testuser
        password: null
        primary_group: wheel
        supplementary_groups:
        - testgroup
  openchami:
    url: https://github.com/OpenCHAMI/release.git
    version: main
  rie_services:
    rf-x0c0s3b0:
      delete: true
    rf-x0c0s4b0:
      delete: true
  testing:
    enabled: true
    tests:
      always-fail:
        depends_on: []
        description: 'A test that always fails for use in testing the testing mechanisms

          '
        enabled: false
        entrypoint: &id001
          entrypoint: true
          mode: '755'
          path: always_fail/entrypoint.sh
        files:
          entrypoint: *id001
        timeout: 10
      always-pass:
        depends_on: []
        description: 'A test that always passes for use in testing the testing mechanisms

          '
        enabled: false
        entrypoint: &id002
          entrypoint: true
          mode: '755'
          path: always_pass/entrypoint.sh
        files:
          entrypoint: *id002
        timeout: 10
      always-time-out:
        depends_on: []
        description: 'A test that always times out for testing the test timeout  mechanism

          '
        enabled: false
        entrypoint: &id003
          entrypoint: true
          mode: '755'
          path: always_time_out/entrypoint.sh
        files:
          entrypoint: *id003
        timeout: 2
      compute-node-ssh:
        depends_on: []
        description: 'A simple test that waits for the compute nodes configured

          within the OpenCHAMI cluster to become available and then

          verifies that each one can be reached from the ''rocky'' user on

          the management (head) node using SSH.

          '
        enabled: true
        entrypoint: &id004
          entrypoint: true
          mode: '755'
          path: compute_node_ssh/entrypoint.sh
        files:
          entrypoint: *id004
        timeout: 600
